{{- define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">Shortcuts</h1>
  </header>
  <div class="post-content">
    <div id="password-gate">
      <p>This page is password protected.</p>
      <input type="password" id="pwd" placeholder="Enter password" style="padding: 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--entry); color: var(--primary); margin-right: 8px;" />
      <button onclick="unlock()" style="padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px; background: var(--entry); color: var(--primary); cursor: pointer;">Unlock</button>
      <p id="error" style="color: red; display: none;">Wrong password.</p>
    </div>
    <div id="content" style="display: none;">
      <table>
        <thead>
          <tr><th>Name</th><th>Link</th></tr>
        </thead>
        <tbody>
          <tr><td>Zoom</td><td><a href="/zoom/">hchen.io/zoom</a></td></tr>
          <tr><td>ISIS (TU Berlin)</td><td><a href="/isis/">hchen.io/isis</a></td></tr>
          <tr><td>TUPort (SAP)</td><td><a href="/tuport/">hchen.io/tuport</a></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</article>
<script>
function unlock() {
  if (document.getElementById('pwd').value === 'itisme') {
    document.getElementById('password-gate').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } else {
    document.getElementById('error').style.display = 'block';
  }
}
document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlock();
});
</script>
{{- end }}
