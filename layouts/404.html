{{- define "main" }}
<section class="error-404">
  <div class="error-404__copy">
    <p class="error-404__eyebrow">Lost in the archive</p>
    <h1 class="error-404__code">404</h1>
    <p class="error-404__headline">This page is off the map.</p>
    <p class="error-404__lede">
      The link may be outdated, the post may have moved, or this URL was never part of the site.
    </p>
    {{- with site.Params.profileMode.title }}
    <p class="error-404__tagline">{{ . }}</p>
    {{- end }}
    <div class="error-404__actions">
      <a class="error-404__button error-404__button--primary" href="{{ "/" | relLangURL }}">Home</a>
      <a class="error-404__button" href="{{ "search/" | relLangURL }}">Search</a>
      <a class="error-404__button" href="{{ "archives/" | relLangURL }}">Archive</a>
    </div>
  </div>

  <div class="error-404__visual" aria-hidden="true">
    <div class="error-404__radar">
      <div class="error-404__ring error-404__ring--outer"></div>
      <div class="error-404__ring error-404__ring--inner"></div>
      <div class="error-404__axis error-404__axis--horizontal"></div>
      <div class="error-404__axis error-404__axis--vertical"></div>
      <div class="error-404__sweep"></div>
      <div class="error-404__dot error-404__dot--one"></div>
      <div class="error-404__dot error-404__dot--two"></div>
      <div class="error-404__dot error-404__dot--three"></div>
      <div class="error-404__center">
        <span class="error-404__needle"></span>
      </div>
    </div>
  </div>
</section>
{{- end }}{{/* end main */ -}}
