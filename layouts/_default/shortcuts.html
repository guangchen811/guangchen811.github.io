{{- define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">Shortcuts</h1>
  </header>
  <div class="post-content">
    <div id="password-gate" style="text-align: center; padding: 3rem 0;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5; margin-bottom: 1rem;">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      <p style="opacity: 0.7; margin-bottom: 1.5rem;">Enter password to view shortcuts</p>
      <div style="display: flex; justify-content: center; gap: 0.5rem; max-width: 320px; margin: 0 auto;">
        <input type="password" id="pwd" placeholder="Password"
          style="flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--entry); color: var(--primary); font-size: 1rem; outline: none;" />
        <button onclick="unlock()"
          style="padding: 10px 20px; border: none; border-radius: 8px; background: var(--primary); color: var(--theme); font-size: 1rem; cursor: pointer; font-weight: 500;">
          Go
        </button>
      </div>
      <p id="error" style="color: #e74c3c; margin-top: 0.8rem; display: none; font-size: 0.9rem;">Wrong password, try again.</p>
    </div>
    <div id="content" style="display: none;"></div>
  </div>
</article>

function xorDecode(password, b64) {
  var raw = atob(b64);
  var out = [];
  for (var i = 0; i < raw.length; i++) {
    out.push(String.fromCharCode(raw.charCodeAt(i) ^ password.charCodeAt(i % password.length)));
  }
  return out.join('');
}

function unlock() {
  var pwd = document.getElementById('pwd').value;
  var html = xorDecode(pwd, encData);
  if (html.indexOf('<div') === 0) {
    document.getElementById('content').innerHTML = html;
    document.getElementById('password-gate').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } else {
    document.getElementById('error').style.display = 'block';
    document.getElementById('pwd').style.borderColor = '#e74c3c';
    setTimeout(function() { document.getElementById('pwd').style.borderColor = ''; }, 1000);
  }
}

document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlock();
});
document.getElementById('pwd').focus();
