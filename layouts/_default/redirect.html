{{- define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">Redirecting...</h1>
  </header>
  <div class="post-content">
    <p>You are being redirected to <a href="{{ .Params.redirect_url }}">{{ .Params.redirect_url }}</a>.</p>
  </div>
</article>
<meta http-equiv="refresh" content="0; url={{ .Params.redirect_url }}" />
{{- end }}
