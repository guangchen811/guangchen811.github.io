<div style="margin-bottom: 1.5rem; padding: 1rem 1.2rem; border: 1px solid var(--border); border-radius: 10px; background: var(--entry);">
  <div style="font-weight: 600; font-size: 1.05rem; margin-bottom: 0.3rem;">
    {{ .Get "title" }}
  </div>
  <div style="opacity: 0.7; font-size: 0.9rem; margin-bottom: 0.3rem;">
    {{ .Get "authors" | markdownify }}
  </div>
  <div style="font-style: italic; font-size: 0.9rem; opacity: 0.6; margin-bottom: 0.6rem;">
    {{ .Get "venue" }}
  </div>
  <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
    {{ with .Get "paper" }}
    <a href="{{ . }}" target="_blank" style="display: inline-flex; align-items: center; gap: 0.3rem; padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.8rem; text-decoration: none; color: var(--primary);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Paper
    </a>
    {{ end }}
    {{ with .Get "code" }}
    <a href="{{ . }}" target="_blank" style="display: inline-flex; align-items: center; gap: 0.3rem; padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.8rem; text-decoration: none; color: var(--primary);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Code
    </a>
    {{ end }}
    {{ with .Get "slides" }}
    <a href="{{ . }}" target="_blank" style="display: inline-flex; align-items: center; gap: 0.3rem; padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.8rem; text-decoration: none; color: var(--primary);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Slides
    </a>
    {{ end }}
    {{ with .Get "video" }}
    <a href="{{ . }}" target="_blank" style="display: inline-flex; align-items: center; gap: 0.3rem; padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.8rem; text-decoration: none; color: var(--primary);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      Video
    </a>
    {{ end }}
  </div>
</div>
