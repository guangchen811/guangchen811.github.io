<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">Shortcuts</h1>
  </header>
  <div class="post-content">
    <div id="password-gate" style="text-align: center; padding: 3rem 0;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5; margin-bottom: 1rem;">

        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      <p style="opacity: 0.7; margin-bottom: 1.5rem;">Enter password to view shortcuts</p>
      <div style="display: flex; justify-content: center; gap: 0.5rem; max-width: 320px; margin: 0 auto;">
        <input type="password" id="pwd" placeholder="Password"

          style="padding: 10px 20px; border: none; border-radius: 8px; background: var(--primary); color: var(--theme); font-size: 1rem; cursor: pointer; font-weight: 500;">
          Go
        </button>
      </div>
      <p id="error" style="color: #e74c3c; margin-top: 0.8rem; display: none; font-size: 0.9rem;">Wrong password, try again.</p>

    <div id="content" style="display: none;"></div>
  </div>
</article>

async function deriveKey(password, salt) {
  var enc = new TextEncoder();
  var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256'}, keyMaterial, {name: 'AES-GCM', length: 256}, false, ['decrypt']);
}

async function encrypt(password, plaintext) {
  var enc = new TextEncoder();
  var salt = crypto.getRandomValues(new Uint8Array(16));
  var iv = crypto.getRandomValues(new Uint8Array(12));
  var key = await deriveKey(password, salt);
  var ct = await crypto.subtle.encrypt({name: 'AES-GCM', iv: iv}, key, enc.encode(plaintext));
  var buf = new Uint8Array(salt.length + iv.length + ct.byteLength);
  buf.set(salt, 0);
  buf.set(iv, salt.length);
  buf.set(new Uint8Array(ct), salt.length + iv.length);
  return btoa(String.fromCharCode.apply(null, buf));
}

async function decrypt(password, data) {
  var raw = Uint8Array.from(atob(data), function(c) { return c.charCodeAt(0); });
  var salt = raw.slice(0, 16);
  var iv = raw.slice(16, 28);
  var ct = raw.slice(28);
  var key = await deriveKey(password, salt);
  var dec = await crypto.subtle.decrypt({name: 'AES-GCM', iv: iv}, key, ct);
  return new TextDecoder().decode(dec);
}

async function unlock() {
  var pwd = document.getElementById('pwd').value;
  try {
    var html = await decrypt(pwd, encData);
    document.getElementById('content').innerHTML = html;
    document.getElementById('password-gate').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('pwd').style.borderColor = '#e74c3c';
    setTimeout(function() { document.getElementById('pwd').style.borderColor = ''; }, 1000);
  }
}

document.getElementById('pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlock();
});
document.getElementById('pwd').focus();
